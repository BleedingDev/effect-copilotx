[tools]
bun = "latest"

[tasks.start]
description = "Create local env, start PostgreSQL 18, and run CopilotX"
run = "bun run tools/start-local.ts"

[tasks.dev]
description = "Alias for start"
run = "bun run tools/start-local.ts"

[tasks.stop]
description = "Stop local PostgreSQL"
run = "docker compose down"

[tasks.install]
description = "Install Bun dependencies"
run = "bun install"

[tasks.build]
description = "Build the TypeScript project"
run = "bun run build"

[tasks.typecheck]
description = "Run the TypeScript checker"
run = "bun run typecheck"

[tasks.test]
description = "Run the Bun test suite"
run = "bun run test"

[tasks.check]
description = "Run typecheck and tests"
run = "bun run check"

[tasks.serve]
description = "Start only the proxy server (advanced)"
env = { _.file = ".env" }
run = "bun run src/bin/cli.ts serve"

[tasks.auth-login]
description = "Authenticate a Copilot account"
env = { _.file = ".env" }
run = "bun run src/bin/cli.ts auth login"

[tasks.auth-logout]
description = "Remove persisted Copilot accounts"
env = { _.file = ".env" }
run = "bun run src/bin/cli.ts auth logout"

[tasks.config-claude-code]
description = "Write Claude Code settings for the running or configured proxy"
env = { _.file = ".env" }
run = "bun run src/bin/cli.ts config claude-code"


[tasks.status]
description = "Show account and quota status"
env = { _.file = ".env" }
run = "bun run src/bin/cli.ts status"

[tasks.models]
description = "List all discovered models, including hidden ones"
env = { _.file = ".env" }
run = "bun run src/bin/cli.ts models"

[tasks.db-up]
description = "Start only the local PostgreSQL service (advanced)"
run = "docker compose up -d postgres"

[tasks.db-down]
description = "Stop only the local PostgreSQL service (advanced)"
run = "docker compose down"

[tasks.db-reset]
description = "Reset the local PostgreSQL service and data"
run = "docker compose down -v && docker compose up -d postgres"

[tasks.db-generate]
description = "Generate Drizzle migrations"
run = "bun run db:generate"

[tasks.db-migrate]
description = "Apply Drizzle migrations"
env = { _.file = ".env" }
run = "bun run db:migrate"

[tasks.knip]
description = "Run dead-code analysis"
run = "bun run knip"

[tasks.jscpd]
description = "Run duplicate-code analysis"
run = "bun run jscpd"
